<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>تشخیص دست برای App Inventor</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
  }
  #videoElement {
    width: 100%;
    height: 50vh; /* نصف ارتفاع صفحه */
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>

<script type="module">
  // وارد کردن MediaPipe Hands و Camera
  import {Hands} from 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
  import {Camera} from 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';

  const videoElement = document.getElementById('videoElement');

  // تنظیمات شناسایی دست
  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5
  });

  // تابع شناسایی gesture و ارسال به App Inventor
  hands.onResults((results) => {
    if (results.multiHandLandmarks) {
      results.multiHandLandmarks.forEach((landmarks, index) => {

        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        const middleTip = landmarks[12];
        const ringTip = landmarks[16];
        const pinkyTip = landmarks[20];
        const wrist = landmarks[0];

        // فاصله شست و اشاره
        const distanceThumbIndex = Math.hypot(
          thumbTip.x - indexTip.x,
          thumbTip.y - indexTip.y
        );

        // تشخیص gesture ساده
        let gesture = "open";

        // Pinch (چسباندن شست و اشاره)
        if (distanceThumbIndex < 0.05) {
          gesture = "pinch";
        }

        // Fist (مشت کردن)
        const fist = [thumbTip, indexTip, middleTip, ringTip, pinkyTip].every(pt => pt.y > wrist.y);
        if (fist) {
          gesture = "fist";
        }

        // آماده سازی داده JSON برای App Inventor
        const data = {
          hand: index + 1,
          gesture: gesture,
          pinchDistance: distanceThumbIndex.toFixed(3)
        };

        // ارسال به App Inventor WebView
        if (window.AppInventor) {
          window.AppInventor.setWebViewString(JSON.stringify(data));
        }
      });
    }
  });

  // راه‌اندازی دوربین
  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 1280,
    height: 720
  });
  camera.start();

</script>
</body>
</html>
