<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تشخیص گفتار فارسی زنده بهینه</title>
<style>
    body { font-family: Tahoma, sans-serif; text-align:center; margin:20px; }
    button { padding:10px 20px; font-size:16px; margin:10px; cursor:pointer; }
    #result { margin-top:20px; padding:10px; border:1px solid #ccc; min-height:50px; background-color:#f9f9f9; word-break: break-word; }
</style>
</head>
<body>
<h1>تشخیص گفتار فارسی زنده بهینه</h1>
<button id="startBtn">شروع زنده</button>
<button id="stopBtn" disabled>توقف</button>
<div id="result">متن زنده در اینجا نمایش داده می‌شود...</div>

<script src="https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist/vosk.js"></script>
<script>
let recognizer, audioContext, mediaStream;
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const resultDiv = document.getElementById('result');

async function startOptimizedRecognition() {
    startBtn.disabled = true;
    stopBtn.disabled = false;

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioContext.createMediaStreamSource(mediaStream);

    // بارگذاری مدل کوچک فارسی (سریع‌تر)
    const model = await Vosk.createModel('https://alphacephei.com/vosk/models/vosk-model-small-fa-0.4.zip');
    recognizer = new model.Recognizer({ sampleRate: audioContext.sampleRate });

    if (audioContext.audioWorklet) {
        await audioContext.audioWorklet.addModule(URL.createObjectURL(new Blob([`
            class VoskProcessor extends AudioWorkletProcessor {
                process(inputs) {
                    const input = inputs[0][0];
                    if (input) {
                        this.port.postMessage(Float32Array.from(input));
                    }
                    return true;
                }
            }
            registerProcessor('vosk-processor', VoskProcessor);
        `], {type: 'application/javascript'})));

        const workletNode = new AudioWorkletNode(audioContext, 'vosk-processor');
        workletNode.port.onmessage = (event) => {
            const floatData = event.data;
            const intData = new Int16Array(floatData.length);
            for (let i = 0; i < floatData.length; i++) intData[i] = floatData[i] * 32768;

            recognizer.acceptWaveform(intData);
            resultDiv.innerText = recognizer.partialResult().partial;
        };
        source.connect(workletNode).connect(audioContext.destination);
    } else {
        // fallback برای مرورگرهای قدیمی
        const processor = audioContext.createScriptProcessor(4096,1,1);
        processor.onaudioprocess = (event) => {
            const data = event.inputBuffer.getChannelData(0);
            const intData = new Int16Array(data.length);
            for (let i = 0; i < data.length; i++) intData[i] = data[i]*32768;

            recognizer.acceptWaveform(intData);
            resultDiv.innerText = recognizer.partialResult().partial;
        };
        source.connect(processor);
        processor.connect(audioContext.destination);
    }
}

function stopOptimizedRecognition() {
    startBtn.disabled = false;
    stopBtn.disabled = true;

    mediaStream.getTracks().forEach(track => track.stop());
    audioContext.close();
    const finalText = recognizer.finalResult().text;
    resultDiv.innerText = finalText;
}

startBtn.addEventListener('click', startOptimizedRecognition);
stopBtn.addEventListener('click', stopOptimizedRecognition);
</script>
</body>
</html>
