<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking JSON Output</title>
<style>
  body { margin: 0; overflow: hidden; }
  video { 
    width: 100vw; 
    height: 50vh; 
    object-fit: cover; 
    display: block; 
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script type="module">
import {Hands} from 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
import {Camera} from 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';

// گرفتن ویدیو
const videoElement = document.getElementById('video');

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

// وقتی دست پیدا شد
hands.onResults((results) => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0].map(l => ({x: l.x, y: l.y, z: l.z}));
    
    // ساده‌سازی تشخیص gestures
    let gesture = "unknown";
    const thumbTip = landmarks[4];
    const indexTip = landmarks[8];
    const middleTip = landmarks[12];
    const ringTip = landmarks[16];
    const pinkyTip = landmarks[20];
    const wrist = landmarks[0];

    // مشت کردن: فاصله انگشتان به هم نزدیک باشه
    const distIndexWrist = Math.hypot(indexTip.x - wrist.x, indexTip.y - wrist.y);
    const distThumbWrist = Math.hypot(thumbTip.x - wrist.x, thumbTip.y - wrist.y);
    if (distIndexWrist < 0.1 && distThumbWrist < 0.1) {
      gesture = "fist";
    }

    // اشاره و شست: فاصله کم بین انگشت اشاره و شست
    const distThumbIndex = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
    if (distThumbIndex < 0.05) {
      gesture = "pinch";
    }

    // ارسال JSON به اپ اینونتور
    const output = {
      gesture: gesture,
      landmarks: landmarks
    };
    // اینجا می‌تونید از fetch یا websocket برای ارسال به سرور یا اپ اینونتور استفاده کنید
    console.log(JSON.stringify(output));
  }
});

// راه‌اندازی دوربین
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 640,
  height: 480
});
camera.start();
</script>

</body>
</html>
