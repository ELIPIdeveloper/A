<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Offline AI</title>
</head>
<body>

<h3>AI آفلاین</h3>

<input id="input" placeholder="پیام بنویس">
<button onclick="send()">ارسال</button>

<p id="output"></p>

<script src="https://unpkg.com/@mlc-ai/web-llm"></script>

<script>
let engine;

async function init() {
    engine = await webllm.CreateMLCEngine("Phi-3-mini");
    document.getElementById("output").innerText = "AI آماده است";
}

async function send() {
    const text = document.getElementById("input").value;

    const reply = await engine.chat.completions.create({
        messages: [{ role: "user", content: text }]
    });

    document.getElementById("output").innerText =
        reply.choices[0].message.content;
}

init();
</script>

</body>
</html>
