<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>تشخیص دست برای App Inventor</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
  }
  #videoElement {
    width: 100%;
    height: 50vh; /* نصف ارتفاع صفحه */
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>

<script type="module">
  import {Hands} from 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
  import {drawConnectors, drawLandmarks} from 'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js';

  const videoElement = document.getElementById('videoElement');

  // دریافت ویدیو از دوربین
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      videoElement.srcObject = stream;
      await videoElement.play();
      startHandsDetection();
    } catch (err) {
      console.error("دوربین در دسترس نیست:", err);
    }
  }

  // تنظیم MediaPipe Hands
  function startHandsDetection() {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((landmarks, index) => {
          const thumbTip = landmarks[4];
          const indexTip = landmarks[8];
          const wrist = landmarks[0];

          // فاصله شست و اشاره
          const distanceThumbIndex = Math.hypot(
            thumbTip.x - indexTip.x,
            thumbTip.y - indexTip.y
          );

          let gesture = "open";
          if (distanceThumbIndex < 0.05) gesture = "pinch";

          const fist = [4,8,12,16,20].every(i => landmarks[i].y > wrist.y);
          if (fist) gesture = "fist";

          const data = {
            hand: index + 1,
            gesture: gesture,
            pinchDistance: distanceThumbIndex.toFixed(3)
          };

          if (window.AppInventor) {
            window.AppInventor.setWebViewString(JSON.stringify(data));
          }
        });
      }
    });

    // حلقه پردازش ویدیو
    async function processFrame() {
      await hands.send({image: videoElement});
      requestAnimationFrame(processFrame);
    }

    processFrame();
  }

  startCamera();
</script>

</body>
</html>
